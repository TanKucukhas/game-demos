<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Isometric Village — playable scene</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(1200px 700px at 50% 16%, #2a3550 0%, #171a26 55%, #0c0e15 100%);
    color: #cdd6e6; font: 13px/1.5 ui-sans-serif, system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100%; gap: 14px; padding: 20px; box-sizing: border-box;
  }
  h1 { font-size: 15px; font-weight: 600; letter-spacing: .3px; margin: 0;
       display: flex; align-items: center; gap: 8px; color: #e7ecf7; }
  h1 .dot { width: 7px; height: 7px; border-radius: 50%; background: #5cd08a; box-shadow: 0 0 8px #5cd08a; }
  .stage {
    position: relative; width: min(94vw, 940px); aspect-ratio: 720/470;
    border-radius: 14px; overflow: hidden;
    background: radial-gradient(760px 460px at 50% 42%, #6f86b8 0%, #45557d 45%, #2b3450 100%);
    box-shadow: 0 24px 60px -20px #000, inset 0 0 0 1px #ffffff14;
  }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%;
           image-rendering: pixelated; image-rendering: crisp-edges; }
  .bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center;
         font-size: 12px; color: #93a0b8; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px;
          background: #ffffff0f; border: 1px solid #ffffff14; border-radius: 999px; }
  .chip b { color: #cdd6e6; font-weight: 600; }
  button { font: inherit; color: #cdd6e6; background: #ffffff12; border: 1px solid #ffffff1f;
           padding: 5px 12px; border-radius: 8px; cursor: pointer; }
  button:hover { background: #ffffff20; }
  button:focus-visible { outline: 2px solid #5cd08a; outline-offset: 2px; }
</style>
</head>
<body>
  <h1><span class="dot"></span> Isometric Village — a live, playable scene</h1>
  <div class="stage"><canvas id="cv" width="720" height="470"></canvas></div>
  <div class="bar">
    <span class="chip">🎮 <b>Hero</b> = you · ↑←↓→ / WASD</span>
    <span class="chip">🟩 Goblin</span>
    <span class="chip">🔵 Slime</span>
    <span class="chip">🧑‍🌾 Villagers</span>
    <span class="chip">🐈 Cat</span>
    <span class="chip"><span style="opacity:.6">autonomous wanderers</span></span>
    <span>· <b id="fps">–</b> fps · <button id="pause">⏸ Pause</button></span>
  </div>
  <script type="module" src="src/engine.js"></script>
</body>
</html>
